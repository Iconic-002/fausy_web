<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Fausy Stylist</title>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; padding: 40px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #8b5e3c; border-bottom: 2px solid #fdfaf6; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #fdfaf6; color: #8b5e3c; }
        .status-pending { color: #d97706; font-weight: bold; background: #fef3c7; padding: 4px 8px; border-radius: 4px; }
        .mpesa-code { font-family: monospace; background: #f1f3f5; padding: 2px 5px; border-radius: 3px; font-weight: bold; }
        .refresh-btn { background: #8b5e3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; float: right; }
    </style>
</head>
<body>

<div class="container">
    <button class="refresh-btn" onclick="loadBookings()">🔄 Refresh List</button>
    <h1>Booking Management</h1>
    
    <table id="adminTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Time</th>
                <th>Client</th>
                <th>Phone</th>
                <th>Style</th>
                <th>M-Pesa Code</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="bookingData">
            </tbody>
    </table>
</div>

<script>
    async function loadBookings() {
        const password = prompt("Enter Admin Password:");
        if (!password) return;

        try {
            const response = await fetch(`http://127.0.0.1:5000/api/admin/bookings?password=${password}`);
            if (!response.ok) throw new Error("Unauthorized or Server Error");
            
            const bookings = await response.json();
            const tableBody = document.getElementById('bookingData');
            tableBody.innerHTML = ""; // Clear old data

            bookings.forEach(b => {
                const row = `
                    <tr>
                        <td>${b.booking_date}</td>
                        <td>${b.start_time}</td>
                        <td>${b.customer_name}</td>
                        <td><a href="tel:${b.phone}">${b.phone}</a></td>
                        <td>${b.style_name}</td>
                        <td><span class="mpesa-code">${b.mpesa_code}</span></td>
                        <td><span class="status-pending">${b.status}</span></td>
                    </tr>
                `;
                tableBody.insertAdjacentHTML('beforeend', row);
            });
        } catch (err) {
            alert(err.message);
        }
    }

    // Load automatically on page open
    window.onload = loadBookings;
</script>

</body>
</html>
