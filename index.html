<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fausy Stylist | Premium Hair Booking</title>
    <style>
        :root {
            --primary: #8b5e3c;
            --secondary: #d4a373;
            --bg: #fdfaf6;
            --text: #333;
            --success: #28a745;
            --error: #c53030;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { 
            max-width: 450px; 
            width: 100%;
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
        }

        h2 { color: var(--primary); text-align: center; margin-bottom: 10px; }
        p.subtitle { text-align: center; font-size: 0.9rem; color: #666; margin-bottom: 25px; }

        .payment-box {
            background: #f1f3f5;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.85rem;
            border-left: 4px solid var(--secondary);
            margin-bottom: 20px;
        }

        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select, button { 
            width: 100%; 
            padding: 12px; 
            margin-top: 8px; 
            border: 1px solid #eee; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 1rem;
        }

        input:focus, select:focus { outline: none; border-color: var(--secondary); background: #fffdfa; }

        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            font-weight: bold; 
            margin-top: 25px; 
            transition: 0.3s;
        }

        button:hover { background: #724a2f; transform: translateY(-2px); }

        #custom-section { 
            display: none; 
            background: #fff9f0; 
            padding: 15px; 
            border-radius: 10px; 
            margin-top: 15px; 
            border: 1px dashed var(--secondary); 
        }

        .wa-link { color: var(--success); text-decoration: none; font-size: 0.8rem; font-weight: bold; }

        #reschedule-ui { 
            display: none; 
            margin-top: 25px; 
            padding: 20px; 
            background: #fff5f5; 
            border: 1px solid #feb2b2; 
            border-radius: 12px; 
            text-align: center; 
        }

        .call-btn { 
            display: block; 
            background: var(--success); 
            color: white; 
            padding: 12px; 
            text-decoration: none; 
            border-radius: 10px; 
            margin-top: 15px; 
            font-weight: bold;
        }
        .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 15px;
    margin-bottom: 30px;
}
.style-card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    text-align: center;
    padding-bottom: 10px;
}
.style-card img, .style-card video {
    width: 100%;
    height: 150px;
    object-fit: cover;
}
.style-card h4 { margin: 10px 0 5px; font-size: 0.9rem; color: #8b5e3c; }
    </style>
</head>
<body>

<div class="container">
    <h2>Fausy Stylist</h2>
    <p class="subtitle">Book your premium hair session</p>

    <div class="payment-box">
        <strong>💸 Payment Instructions:</strong><br>
        Send money to <b>0726694019</b> (M-Pesa) before completing this form.
    </div>
    
    <form id="bookingForm">
        <label>Select Hairstyle</label>
        <select id="style_id" required onchange="toggleCustom()">
            <option value="">-- Choose a style --</option>
            <option value="1">Soft Locs (3 Hours)</option>
            <option value="2">Knotless Braids (4 Hours)</option>
            <option value="custom">Other / Custom Style (Discuss via Call)</option>
        </select>

        <div id="custom-section">
            <label>Style Description</label>
            <input type="text" id="custom_style_name" placeholder="E.g. Bohemian Passion Twists">
            <p style="margin-top: 10px;">
                <a href="https://wa.me/254103119007" target="_blank" class="wa-link">
                    💬 Send reference photo to +254 103 119007
                </a>
            </p>
        </div>

        <label>Full Name</label>
        <input type="text" id="customer_name" placeholder="John Doe" required>

        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="0712345678" required>

        <label>Date & Preferred Time</label>
        <div style="display: flex; gap: 10px;">
            <input type="date" id="booking_date" required>
            <input type="time" id="start_time" required>
        </div>

        <label>M-Pesa Transaction Code</label>
        <input type="text" id="mpesa_code" placeholder="Example: SGR345HJ9K" required maxlength="10">

        <button type="submit" id="submitBtn">Confirm Booking</button>
    </form>

    <div id="reschedule-ui">
        <p id="error-msg" style="color: var(--error); font-weight: bold;"></p>
        <p style="font-size: 0.9rem;">This slot is already taken. Please speak with us to find a better time.</p>
        <a href="tel:+254726694019" class="call-btn">📞 Call 0726694019 to Reschedule</a>
    </div>
</div>

<script>
    // Duration mapping in minutes
    const durationMap = { "1": 180, "2": 240, "custom": 120 };

    function toggleCustom() {
        const style = document.getElementById('style_id').value;
        const section = document.getElementById('custom-section');
        const input = document.getElementById('custom_style_name');
        
        section.style.display = (style === 'custom') ? 'block' : 'none';
        input.required = (style === 'custom');
    }

    document.getElementById('bookingForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const reschedUI = document.getElementById('reschedule-ui');
        
        btn.innerText = "Processing...";
        btn.disabled = true;
        reschedUI.style.display = 'none';

        const styleId = document.getElementById('style_id').value;
        
        const payload = {
            customer_name: document.getElementById('customer_name').value,
            phone: document.getElementById('phone').value,
            style_id: styleId,
            custom_style_name: document.getElementById('custom_style_name').value,
            booking_date: document.getElementById('booking_date').value,
            start_time: document.getElementById('start_time').value,
            mpesa_code: document.getElementById('mpesa_code').value,
            duration: durationMap[styleId]
        };

        try {
const response = await fetch('https://fausy-web.onrender.com/api/bookings/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (response.status === 409) {
                // Time Conflict
                document.getElementById('error-msg').innerText = result.error;
                reschedUI.style.display = 'block';
                window.scrollTo(0, document.body.scrollHeight);
            } else if (response.ok) {
                alert("Success! " + result.message);
                e.target.reset();
                toggleCustom();
            } else {
                alert("Error: " + (result.error || "Something went wrong"));
            }
        } catch (err) {
            alert("Could not connect to the backend server. Make sure app.py is running!");
            console.error(err);
        } finally {
            btn.innerText = "Confirm Booking";
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
